<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wake. — concept comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    .header {
      font-size: 14px;
      font-weight: 300;
      color: #333;
      letter-spacing: 0.3em;
      text-transform: lowercase;
      margin-bottom: 40px;
    }

    .concepts {
      display: flex;
      gap: 48px;
      align-items: flex-start;
    }

    .concept-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .phone-frame {
      width: 320px;
      height: 620px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      position: relative;
    }

    .concept-label {
      margin-top: 20px;
      text-align: center;
    }

    .concept-label h3 {
      font-size: 13px;
      font-weight: 400;
      color: #666;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      margin-bottom: 6px;
    }

    .concept-label p {
      font-size: 11px;
      font-weight: 300;
      color: #444;
      max-width: 200px;
    }

    /* ========== LIQUID ========== */
    .liquid {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .liquid-bg {
      position: absolute;
      inset: 0;
      background: 
        conic-gradient(from 45deg at 30% 40%, #ff7e67 0deg, #20b2aa 90deg, #ffb347 180deg, #ff6b6b 270deg, #ff7e67 360deg),
        radial-gradient(ellipse at 70% 60%, #ffb347 0%, transparent 50%),
        radial-gradient(ellipse at 20% 80%, #20b2aa 0%, transparent 40%);
      filter: blur(60px) saturate(1.2);
    }

    .liquid-glass {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }

    .liquid-orb-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .liquid-orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), rgba(255,255,255,0.05));
      box-shadow: 
        inset 0 0 40px rgba(255,255,255,0.3), 
        0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.4);
      position: relative;
      animation: orb-breathe 3s ease-in-out infinite, orb-highlight 6s linear infinite;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .liquid-orb.active {
      box-shadow: 
        inset 0 0 60px rgba(255,255,255,0.5), 
        0 8px 48px rgba(255,255,255,0.2),
        0 0 80px rgba(255,255,255,0.15);
    }

    @keyframes orb-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    @keyframes orb-highlight {
      0% { background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), rgba(255,255,255,0.05)); }
      25% { background: radial-gradient(circle at 65% 35%, rgba(255,255,255,0.6), rgba(255,255,255,0.05)); }
      50% { background: radial-gradient(circle at 65% 65%, rgba(255,255,255,0.6), rgba(255,255,255,0.05)); }
      75% { background: radial-gradient(circle at 35% 65%, rgba(255,255,255,0.6), rgba(255,255,255,0.05)); }
      100% { background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), rgba(255,255,255,0.05)); }
    }

    .liquid-ripple {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      pointer-events: none;
      opacity: 0;
      top: 0;
      left: 0;
    }

    .liquid-ripple.animate {
      animation: ripple-out 0.8s ease-out;
    }

    @keyframes ripple-out {
      0% {
        transform: scale(1);
        opacity: 0.6;
      }
      100% {
        transform: scale(2.5);
        opacity: 0;
      }
    }

    .liquid-text {
      margin-top: 24px;
      font-size: 11px;
      font-weight: 300;
      color: white;
      letter-spacing: 0.1em;
      opacity: 0.8;
      transition: opacity 0.3s;
    }

    /* ========== GRADIENT ========== */
    .gradient {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 60px;
      cursor: pointer;
      overflow: hidden;
    }

    .gradient-bg {
      position: absolute;
      inset: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse at 20% 30%, #FF6B6B 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, #FFB347 0%, transparent 45%),
        radial-gradient(ellipse at 70% 70%, #C084FC 0%, transparent 50%),
        radial-gradient(ellipse at 30% 80%, #1e1b4b 0%, transparent 55%),
        linear-gradient(135deg, #FF6B6B 0%, #1e1b4b 100%);
      animation: gradient-shift 8s ease-in-out infinite;
      transition: filter 0.5s ease;
    }

    .gradient.active .gradient-bg {
      filter: brightness(1.3) saturate(1.2);
    }

    @keyframes gradient-shift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(-10%, 5%) rotate(2deg); }
      50% { transform: translate(5%, -5%) rotate(-1deg); }
      75% { transform: translate(-5%, -10%) rotate(1deg); }
    }

    .gradient-pill {
      position: relative;
      z-index: 1;
      width: 160px;
      height: 48px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pill-pulse 2s ease-in-out infinite;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .gradient.active .gradient-pill {
      width: 280px;
      height: 500px;
      border-radius: 40px;
      animation: none;
    }

    @keyframes pill-pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .gradient-pill-text {
      font-size: 13px;
      font-weight: 400;
      color: white;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: opacity 0.3s;
    }

    .gradient.active .gradient-pill-text {
      opacity: 0;
    }

    .gradient-mic {
      position: absolute;
      opacity: 0;
      transition: opacity 0.3s 0.2s;
    }

    .gradient.active .gradient-mic {
      opacity: 1;
    }

    .gradient-mic svg {
      width: 48px;
      height: 48px;
      fill: white;
    }

    /* ========== SIGNAL ========== */
    .signal {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .signal-line-container {
      position: relative;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .signal-line {
      width: 200px;
      height: 1.5px;
      background: #e0e0e0;
      transition: background 0.2s, opacity 0.05s;
    }

    .signal:hover .signal-line {
      background: #ffffff;
    }

    .signal-bars {
      display: none;
      gap: 8px;
      align-items: center;
      height: 60px;
    }

    .signal.active .signal-line {
      display: none;
    }

    .signal.active .signal-bars {
      display: flex;
    }

    .signal-bar {
      width: 2px;
      background: white;
      transition: height 0.1s ease;
    }

    .signal-text {
      margin-top: 20px;
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      color: white;
      letter-spacing: 0.2em;
      opacity: 0;
      transition: opacity 0.3s 0.2s;
    }

    .signal.active .signal-text {
      opacity: 1;
    }

    .signal.flickering .signal-line {
      animation: flicker 0.2s steps(4);
    }

    @keyframes flicker {
      0% { opacity: 1; }
      25% { opacity: 0; }
      50% { opacity: 1; }
      75% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">wake.</div>
  
  <div class="concepts">
    <!-- LIQUID -->
    <div class="concept-wrapper">
      <div class="phone-frame">
        <div class="liquid" id="liquid">
          <div class="liquid-bg"></div>
          <div class="liquid-glass"></div>
          <div class="liquid-orb-container">
            <div class="liquid-orb" id="liquid-orb">
              <div class="liquid-ripple" id="liquid-ripple"></div>
            </div>
            <div class="liquid-text" id="liquid-text">tap to wake</div>
          </div>
        </div>
      </div>
      <div class="concept-label">
        <h3>liquid</h3>
        <p>frosted glass orb with ripple feedback</p>
      </div>
    </div>

    <!-- GRADIENT -->
    <div class="concept-wrapper">
      <div class="phone-frame">
        <div class="gradient" id="gradient">
          <div class="gradient-bg"></div>
          <div class="gradient-pill">
            <span class="gradient-pill-text">speak</span>
            <div class="gradient-mic">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
            </div>
          </div>
        </div>
      </div>
      <div class="concept-label">
        <h3>gradient</h3>
        <p>expanding pill becomes the mic</p>
      </div>
    </div>

    <!-- SIGNAL -->
    <div class="concept-wrapper">
      <div class="phone-frame">
        <div class="signal" id="signal">
          <div class="signal-line-container">
            <div class="signal-line" id="signal-line"></div>
            <div class="signal-bars" id="signal-bars"></div>
          </div>
          <div class="signal-text">signal active</div>
        </div>
      </div>
      <div class="concept-label">
        <h3>signal</h3>
        <p>minimal line transforms to waveform</p>
      </div>
    </div>
  </div>

  <script>
    // LIQUID
    const liquid = document.getElementById('liquid');
    const liquidOrb = document.getElementById('liquid-orb');
    const liquidRipple = document.getElementById('liquid-ripple');
    const liquidText = document.getElementById('liquid-text');
    let liquidActive = false;

    liquid.addEventListener('click', () => {
      liquidActive = !liquidActive;
      liquidOrb.classList.toggle('active', liquidActive);
      liquidText.textContent = liquidActive ? 'listening...' : 'tap to wake';
      
      // Trigger ripple
      liquidRipple.classList.remove('animate');
      void liquidRipple.offsetWidth; // Force reflow
      liquidRipple.classList.add('animate');
    });

    // GRADIENT
    const gradient = document.getElementById('gradient');
    let gradientActive = false;

    gradient.addEventListener('click', () => {
      gradientActive = !gradientActive;
      gradient.classList.toggle('active', gradientActive);
    });

    // SIGNAL
    const signal = document.getElementById('signal');
    const signalLine = document.getElementById('signal-line');
    const signalBars = document.getElementById('signal-bars');
    let signalActive = false;
    let waveformInterval = null;

    // Create bars
    for (let i = 0; i < 12; i++) {
      const bar = document.createElement('div');
      bar.className = 'signal-bar';
      bar.style.height = '4px';
      signalBars.appendChild(bar);
    }

    const bars = signalBars.querySelectorAll('.signal-bar');

    function animateBars() {
      bars.forEach(bar => {
        const height = Math.random() * 36 + 4; // 4px to 40px
        bar.style.height = height + 'px';
      });
    }

    signal.addEventListener('click', () => {
      if (!signalActive) {
        // Activate with flicker
        signal.classList.add('flickering');
        setTimeout(() => {
          signal.classList.remove('flickering');
          signal.classList.add('active');
          signalActive = true;
          waveformInterval = setInterval(animateBars, 100);
        }, 200);
      } else {
        // Deactivate
        signal.classList.remove('active');
        signalActive = false;
        if (waveformInterval) {
          clearInterval(waveformInterval);
          waveformInterval = null;
        }
      }
    });
  </script>
</body>
</html>
