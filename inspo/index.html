<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wake App — Inspo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: system-ui, sans-serif; padding: 40px 20px; }
  h1 { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 16px; }
  .item { border-radius: 8px; overflow: hidden; background: #111; }
  .item img { width: 100%; display: block; }
  .item span { display: block; padding: 10px 14px; font-size: 11px; color: #444; letter-spacing: 0.05em; }
</style>
</head>
<body>
<h1>Wake App — Mood Board</h1>
<div class="grid">
  <div class="item"><img src="air-os.png"><span>Air OS — Slavako</span></div>
  <div class="item"><img src="liquid-glass.png"><span>Apple Liquid Glass Smart Home — Md Zia Uddin</span></div>
  <div class="item"><img src="ai-glass-dash.png"><span>AI Assistant Dashboard — Nixtio</span></div>
  <div class="item"><img src="mindfulness.png"><span>Mindfulness App — Nixtio</span></div>
</div>
</body>
</html>
