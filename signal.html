<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pavano says — signal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060606;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }
    .header {
      font-size: 13px; font-weight: 300; color: rgba(245,240,235,0.12);
      letter-spacing: 0.4em; text-transform: lowercase;
      margin-bottom: 40px; user-select: none;
    }
    .stages { display: flex; gap: 60px; align-items: flex-start; }
    .stage-wrapper { display: flex; flex-direction: column; align-items: center; }
    .phone-frame {
      width: 310px; height: 620px; border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden; position: relative; background: #060606;
    }
    .stage-label { margin-top: 18px; text-align: center; }
    .stage-label h3 { font-size: 11px; font-weight: 300; color: rgba(245,240,235,0.4); letter-spacing: 0.2em; text-transform: lowercase; }
    .stage-label p  { font-size: 10px; font-weight: 300; color: rgba(245,240,235,0.2); margin-top: 4px; }
    .arrow { display: flex; align-items: center; color: rgba(245,240,235,0.08); font-size: 18px; margin-top: -300px; user-select: none; }

    /* ── IDLE ── */
    .stage-idle {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .idle-line { width: 180px; height: 1.5px; background: rgba(245,240,235,0.08); border-radius: 2px; transition: background 0.3s; }
    .stage-idle:hover .idle-line { background: rgba(245,240,235,0.15); }
    .idle-hint { margin-top: 24px; font-size: 9px; font-family: 'Space Mono', monospace; color: rgba(245,240,235,0.1); letter-spacing: 0.3em; text-transform: uppercase; }

    /* ── LISTENING ── */
    .stage-active {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .waveform { display: flex; gap: 5px; align-items: center; height: 56px; }
    .wave-bar { width: 2.5px; background: rgba(245,240,235,0.8); border-radius: 2px; transition: height 0.08s ease; }
    .active-text { margin-top: 22px; font-size: 9px; font-family: 'Space Mono', monospace; color: rgba(245,240,235,0.25); letter-spacing: 0.25em; text-transform: uppercase; }

    /* ── RESULTS ── */
    .stage-results {
      width: 310px; height: 620px;
      position: relative; overflow: hidden; background: #060606;
    }

    /* Center waveform */
    .results-wave-wrap {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      z-index: 5; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .results-wave-wrap.hidden { opacity: 0; }
    .results-waveform { display: flex; gap: 4px; align-items: center; height: 40px; }
    .rwave-bar { width: 2px; background: rgba(245,240,235,0.3); border-radius: 2px; transition: height 0.09s ease; }
    .results-signal-text { font-size: 8px; font-family: 'Space Mono', monospace; color: rgba(245,240,235,0.1); letter-spacing: 0.3em; text-transform: uppercase; }

    /* ── BASE CARD ── */
    .result-card {
      position: absolute;
      width: 130px; height: 120px;
      border-radius: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      user-select: none;
      z-index: 10;
    }
    .result-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }

    .card-thumb {
      width: 100%; height: 54px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      font-size: 0;
      position: relative;
    }
    .card-thumb::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .card-body { padding: 8px 10px; }
    .card-title { font-size: 10px; font-weight: 300; color: rgba(245,240,235,0.7); line-height: 1.4; letter-spacing: 0.02em; }
    .card-src   { font-size: 7px; color: rgba(245,240,235,0.2); margin-top: 3px; font-family: 'Space Mono', monospace; letter-spacing: 0.15em; }

    /* Float keyframes */
    @keyframes float-a { 0%{transform:translateY(0) rotate(-0.5deg)} 25%{transform:translateY(-16px) rotate(-2deg)} 55%{transform:translateY(-8px) rotate(0.8deg)} 80%{transform:translateY(-18px) rotate(-1.5deg)} 100%{transform:translateY(0) rotate(-0.5deg)} }
    @keyframes float-b { 0%{transform:translateY(0) rotate(0.5deg)} 35%{transform:translateY(-20px) rotate(2.2deg)} 65%{transform:translateY(-6px) rotate(-0.6deg)} 85%{transform:translateY(-14px) rotate(1.8deg)} 100%{transform:translateY(0) rotate(0.5deg)} }
    @keyframes float-c { 0%{transform:translateY(0) rotate(0deg)} 30%{transform:translateY(-14px) rotate(1.5deg)} 60%{transform:translateY(-22px) rotate(-1deg)} 85%{transform:translateY(-8px) rotate(0.5deg)} 100%{transform:translateY(0) rotate(0deg)} }
    @keyframes float-d { 0%{transform:translateY(0) rotate(-0.8deg)} 40%{transform:translateY(-18px) rotate(-2deg)} 70%{transform:translateY(-5px) rotate(1deg)} 90%{transform:translateY(-12px) rotate(-0.5deg)} 100%{transform:translateY(0) rotate(-0.8deg)} }
    @keyframes float-e { 0%{transform:translateY(0) rotate(0.3deg)} 28%{transform:translateY(-12px) rotate(1.2deg)} 55%{transform:translateY(-20px) rotate(-0.8deg)} 80%{transform:translateY(-6px) rotate(1.5deg)} 100%{transform:translateY(0) rotate(0.3deg)} }
    @keyframes float-f { 0%{transform:translateY(0) rotate(-0.4deg)} 45%{transform:translateY(-16px) rotate(-1.8deg)} 72%{transform:translateY(-8px) rotate(0.9deg)} 90%{transform:translateY(-19px) rotate(-1.2deg)} 100%{transform:translateY(0) rotate(-0.4deg)} }
    @keyframes fi-in   { 0%{opacity:0;transform:translateY(35px) scale(0.9)} 100%{opacity:1;transform:translateY(0) scale(1)} }

    /* ── EXPAND OVERLAY ── */
    /* We use a separate overlay div that morphs from card rect → full screen */
    #expand-overlay {
      position: absolute;
      z-index: 200;
      background: #0d0d0d;
      border-radius: 20px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      --card-color: rgba(255,255,255,0.03);
    }

    #expand-overlay.animating,
    #expand-overlay.open {
      pointer-events: all;
    }

    .overlay-hero {
      width: 100%;
      height: 220px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 64px;
      position: relative;
      padding-top: 60px;
      background: radial-gradient(ellipse 80% 60% at 50% 20%, var(--card-color), transparent 70%);
    }
    .overlay-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, #0d0d0d 100%);
    }
    .overlay-hero::before {
      content: '';
      position: absolute;
      bottom: 0; left: 24px; right: 24px;
      height: 1px;
      background: rgba(255,255,255,0.07);
      z-index: 2;
    }

    .overlay-body {
      flex: 1;
      padding: 0 24px 24px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Content containers - start hidden, fade in after expand completes */
    .overlay-hero,
    .overlay-body {
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
    }
    .overlay-hero-emoji {
      position: relative;
      z-index: 1;
      font-size: 0;
    }
    .overlay-src {
      font-size: 11px; font-family: 'Space Mono', monospace;
      color: rgba(245,240,235,0.15); letter-spacing: 0.4em;
      text-transform: uppercase; margin-bottom: 10px;
      position: absolute;
      top: 60px; left: 0; right: 0;
      text-align: center;
      z-index: 3;
    }
    .overlay-title {
      font-size: 20px; font-weight: 300; color: #f5f0eb;
      line-height: 1.4; margin-bottom: 16px; letter-spacing: -0.01em;
      margin-top: 20px;
    }
    .overlay-copy {
      font-size: 13px; font-weight: 300; color: rgba(245,240,235,0.38);
      line-height: 1.8; flex: 1;
    }
    .overlay-back {
      margin-top: 20px;
      font-size: 8px; font-family: 'Space Mono', monospace;
      color: rgba(245,240,235,0.18); letter-spacing: 0.25em; text-transform: uppercase;
      cursor: pointer; text-align: center; padding: 8px 0;
    }
    .overlay-back:hover { color: rgba(245,240,235,0.35); }


    /* ── STACK ── */
    #card-stack {
      position: absolute;
      bottom: 32px; left: 50%; transform: translateX(-50%);
      width: 60px;
      display: flex; flex-direction: column; align-items: center;
      z-index: 150; cursor: pointer;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #card-stack.visible { opacity: 1; pointer-events: all; }
    .stack-cards {
      position: relative;
      width: 48px; height: 36px;
    }
    .stack-layer {
      position: absolute;
      width: 44px; height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.04);
      bottom: 0;
    }
    .stack-layer:nth-child(1) { transform: rotate(-3.5deg); left: 2px; }
    .stack-layer:nth-child(2) { transform: rotate(2deg); left: 0px; bottom: 3px; background: rgba(255,255,255,0.03); }
    .stack-layer:nth-child(3) { transform: rotate(-1deg); left: 1px; bottom: 6px; background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.05); }
    #card-stack:hover .stack-layer { border-color: rgba(255,255,255,0.12); }
    .stack-label {
      margin-top: 10px;
      font-size: 7px; font-family: 'Space Mono', monospace;
      color: rgba(245,240,235,0.12); letter-spacing: 0.25em; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="header">pavano says. — signal</div>
  <div class="stages">

    <!-- IDLE -->
    <div class="stage-wrapper">
      <div class="phone-frame">
        <div class="stage-idle">
          <div class="idle-line"></div>
          <div class="idle-hint">tap to wake</div>
        </div>
      </div>
      <div class="stage-label"><h3>idle</h3><p>minimal line at rest</p></div>
    </div>

    <div class="arrow">→</div>

    <!-- LISTENING -->
    <div class="stage-wrapper">
      <div class="phone-frame">
        <div class="stage-active">
          <div class="waveform" id="waveform"></div>
          <div class="active-text">signal active</div>
        </div>
      </div>
      <div class="stage-label"><h3>listening</h3><p>line becomes waveform</p></div>
    </div>

    <div class="arrow">→</div>

    <!-- RESULTS -->
    <div class="stage-wrapper">
      <div class="phone-frame">
        <div class="stage-results" id="results-stage">

          <!-- Center waveform -->
          <div class="results-wave-wrap" id="results-wave">
            <div class="results-waveform" id="results-waveform"></div>
            <div class="results-signal-text">signal active</div>
          </div>

          <!-- Cards -->
          <div class="result-card" id="card-a" data-icon="📰" data-title="Knicks trade deadline moves you need to know" data-src="ESPN · 2h ago" data-copy="New York made three moves before the deadline — shoring up the bench and adding a defensive anchor at the four. Here's the full breakdown of who's in, who's out, and what it means for the playoff run." style="left:18px;top:38px"></div>

          <div class="result-card" id="card-b" data-icon="🏀" data-title="OG Anunoby returns to practice — timeline update" data-src="The Athletic · 4h ago" data-copy="OG participated in a full practice session Tuesday, the first time since his shoulder injury in January. The team is targeting a return within the next two weeks if there are no setbacks." style="left:162px;top:108px"></div>

          <div class="result-card" id="card-c" data-icon="⚡" data-title="Karl-Anthony Towns injury report: out tonight" data-src="NBA.com · 6h ago" data-copy="Karl-Anthony Towns has been ruled out for tonight's game against the Heat with a right knee contusion. He is listed as day-to-day and will be re-evaluated before Thursday's matchup." style="left:18px;top:238px"></div>

          <div class="result-card" id="card-d" data-icon="📊" data-title="Why New York is the NBA's most interesting team right now" data-src="The Ringer · 1d ago" data-copy="The Knicks have the best net rating in the East over the last 20 games, a transformed defensive identity, and Jalen Brunson playing at an MVP level. This isn't a fluke — it's construction." style="left:162px;top:320px"></div>

          <div class="result-card" id="card-e" data-icon="🎙️" data-title="Brunson drops 40 in comeback win" data-src="NY Post · 8h ago" data-copy="Down 14 in the third, Brunson took over — 19 points in the fourth quarter alone, including the go-ahead layup with 4.2 seconds left. The Garden went absolutely nuclear." style="left:18px;top:430px"></div>

          <div class="result-card" id="card-f" data-icon="🔥" data-title="Playoff picture: East standings update" data-src="CBS Sports · 3h ago" data-copy="With 18 games left, New York sits third in the East — one game behind Boston, four ahead of Indiana. The tiebreaker over Cleveland is currently in the Knicks' favor." style="left:162px;top:478px"></div>

          <!-- Expand overlay -->
          <div id="expand-overlay">
            <div class="overlay-hero" id="overlay-hero">
              <span class="overlay-hero-emoji" id="overlay-emoji"></span>
            </div>
            <div class="overlay-body">
              <div class="overlay-src" id="overlay-src"></div>
              <div class="overlay-title" id="overlay-title"></div>
              <div class="overlay-copy" id="overlay-copy"></div>
              <div class="overlay-back" id="overlay-back">← back to results</div>
            </div>
          </div>

          <!-- Stack -->
          <div id="card-stack">
            <div class="stack-cards">
              <div class="stack-layer"></div>
              <div class="stack-layer"></div>
              <div class="stack-layer"></div>
            </div>
            <div class="stack-label">5 results</div>
          </div>

        </div>
      </div>
      <div class="stage-label"><h3>results</h3><p>tap a card — others stack below</p></div>
    </div>

  </div>

  <script>
    const EASE = 'cubic-bezier(0.22, 1, 0.36, 1)';
    const EXPO_OUT = 'cubic-bezier(0.16, 1, 0.3, 1)'; // Ultra smooth, no overshoot

    // Card color mapping for overlay backgrounds
    const CARD_COLORS = {
      'card-a': 'rgba(59,130,246,0.08)',   // blue
      'card-b': 'rgba(168,85,247,0.08)',   // purple
      'card-c': 'rgba(234,179,8,0.08)',    // amber
      'card-d': 'rgba(34,197,94,0.08)',    // green
      'card-e': 'rgba(239,68,68,0.08)',    // red
      'card-f': 'rgba(249,115,22,0.08)'    // orange
    };

    // ── Listening waveform ──
    const waveform = document.getElementById('waveform');
    for (let i = 0; i < 14; i++) {
      const b = document.createElement('div');
      b.className = 'wave-bar'; b.style.height = '4px';
      waveform.appendChild(b);
    }
    setInterval(() => {
      waveform.querySelectorAll('.wave-bar').forEach((b, i) => {
        const env = Math.sin((i / 13) * Math.PI);
        b.style.height = Math.round((Math.random() * 0.7 + 0.3) * env * 44 + 4) + 'px';
      });
    }, 90);

    // ── Results waveform ──
    const rw = document.getElementById('results-waveform');
    for (let i = 0; i < 16; i++) {
      const b = document.createElement('div');
      b.className = 'rwave-bar'; b.style.height = '4px';
      rw.appendChild(b);
    }
    setInterval(() => {
      rw.querySelectorAll('.rwave-bar').forEach((b, i) => {
        const env = Math.sin((i / 15) * Math.PI);
        b.style.height = Math.round((Math.random() * 0.6 + 0.3) * env * 28 + 3) + 'px';
      });
    }, 90);

    // ── Card setup ──
    const cardDefs = [
      { id: 'card-a', left: 18,  top: 38,  float: 'float-a', dur: '6s',   floatDelay: '0s'    },
      { id: 'card-b', left: 162, top: 108, float: 'float-b', dur: '7.2s', floatDelay: '0.5s'  },
      { id: 'card-c', left: 18,  top: 238, float: 'float-c', dur: '5.8s', floatDelay: '1s'    },
      { id: 'card-d', left: 162, top: 320, float: 'float-d', dur: '6.6s', floatDelay: '0.3s'  },
      { id: 'card-e', left: 18,  top: 430, float: 'float-e', dur: '7.8s', floatDelay: '0.8s'  },
      { id: 'card-f', left: 162, top: 478, float: 'float-f', dur: '6.3s', floatDelay: '0.2s'  },
    ];

    // Build card inner HTML
    cardDefs.forEach(def => {
      const c = document.getElementById(def.id);
      const icon  = c.dataset.icon;
      const title = c.dataset.title;
      const src   = c.dataset.src;
      c.innerHTML = `
        <div class="card-thumb">${icon}</div>
        <div class="card-body">
          <div class="card-title">${title}</div>
          <div class="card-src">${src}</div>
        </div>`;
    });

    function startFloat(def) {
      const c = document.getElementById(def.id);
      // If animation already exists, just resume it
      if (c.style.animationPlayState === 'paused') {
        c.style.animationPlayState = 'running';
      } else {
        c.style.animation = `${def.float} ${def.dur} ease-in-out ${def.floatDelay} infinite`;
      }
    }

    function pauseFloat(def) {
      const c = document.getElementById(def.id);
      c.style.animationPlayState = 'paused';
    }

    function resumeFloat(def) {
      const c = document.getElementById(def.id);
      c.style.animationPlayState = 'running';
    }

    // Fly in on init
    cardDefs.forEach((def, i) => {
      const c = document.getElementById(def.id);
      setTimeout(() => {
        c.style.animation = `fi-in 0.5s ${EASE} both`;
        c.style.opacity = '1';
        setTimeout(() => startFloat(def), 550);
      }, 300 + i * 70);
    });

    // ── Expand / Collapse ──
    const stage    = document.getElementById('results-stage');
    const overlay  = document.getElementById('expand-overlay');
    const wave     = document.getElementById('results-wave');
    const stackEl  = document.getElementById('card-stack');
    let expanded   = false;
    let originRect = null; // Store original card position for collapse

    // Content containers for unified fade
    const overlayHero = document.getElementById('overlay-hero');
    const overlayBody = document.querySelector('.overlay-body');

    function showContent() {
      overlayHero.style.opacity = '1';
      overlayBody.style.opacity = '1';
    }

    function hideContent() {
      overlayHero.style.opacity = '0';
      overlayBody.style.opacity = '0';
    }

    let expandAnim = null; // Track current WAAPI animation
    let collapseAnim = null; // Track collapse animation

    function expandCard(def) {
      if (expanded) return;
      expanded = true;

      // Cancel any lingering animations on the overlay
      overlay.getAnimations().forEach(a => a.cancel());

      const card = document.getElementById(def.id);
      const stageRect = stage.getBoundingClientRect();
      const cardRect  = card.getBoundingClientRect();

      // Store original position for collapse animation
      originRect = {
        left: cardRect.left - stageRect.left,
        top: cardRect.top - stageRect.top,
        width: cardRect.width,
        height: cardRect.height
      };

      // Populate overlay content
      document.getElementById('overlay-emoji').textContent = card.dataset.icon;
      document.getElementById('overlay-src').textContent   = card.dataset.src;
      document.getElementById('overlay-title').textContent = card.dataset.title;
      document.getElementById('overlay-copy').textContent  = card.dataset.copy;

      // Set card-specific background color
      overlay.style.setProperty('--card-color', CARD_COLORS[def.id] || 'rgba(255,255,255,0.05)');

      // Ensure content is hidden BEFORE expand starts
      overlayHero.style.transition = 'none';
      overlayBody.style.transition = 'none';
      hideContent();
      // Force reflow to apply opacity: 0 immediately
      overlayHero.offsetHeight;
      overlayBody.offsetHeight;
      // Restore transition for later fade-in
      overlayHero.style.transition = 'opacity 0.4s ease-in-out';
      overlayBody.style.transition = 'opacity 0.4s ease-in-out';

      // Position overlay exactly over the card (no transition)
      overlay.style.transition = 'none';
      overlay.style.left   = originRect.left + 'px';
      overlay.style.top    = originRect.top + 'px';
      overlay.style.width  = originRect.width + 'px';
      overlay.style.height = originRect.height + 'px';
      overlay.style.borderRadius = '18px';
      overlay.style.opacity = '1';
      overlay.style.transform = 'none';
      overlay.style.pointerEvents = 'all';
      overlay.classList.add('animating');

      // Force reflow
      overlay.getBoundingClientRect();

      // WAAPI keyframe animation: card rect → full size with mid-scale pop
      // 0% = card, 60% = full size + overshoot border-radius (45px) + scale(1.02), 100% = final
      expandAnim = overlay.animate([
        {
          left: originRect.left + 'px',
          top: originRect.top + 'px',
          width: originRect.width + 'px',
          height: originRect.height + 'px',
          borderRadius: '18px',
          transform: 'scale(1)'
        },
        {
          left: '0px',
          top: '0px',
          width: '310px',
          height: '620px',
          borderRadius: '45px', // Slight overshoot
          transform: 'scale(1.02)', // Satisfying pop
          offset: 0.6
        },
        {
          left: '0px',
          top: '0px',
          width: '310px',
          height: '620px',
          borderRadius: '50px',
          transform: 'scale(1)'
        }
      ], {
        duration: 680,
        easing: EXPO_OUT,
        fill: 'forwards'
      });

      expandAnim.onfinish = () => {
        // Commit final styles
        overlay.style.left = '0px';
        overlay.style.top = '0px';
        overlay.style.width = '310px';
        overlay.style.height = '620px';
        overlay.style.borderRadius = '50px';
        overlay.style.transform = 'scale(1)';
        overlay.classList.remove('animating');
        overlay.classList.add('open');

        // PHASE 2: Content fades in now that card is fully open
        showContent();
      };

      // Pause all floating cards + fade out
      wave.classList.add('hidden');
      cardDefs.forEach(d => {
        const c = document.getElementById(d.id);
        pauseFloat(d);
        if (d.id !== def.id) {
          c.style.transition = `opacity 0.35s ease, transform 0.5s ${EASE}`;
          c.style.opacity = '0';
          c.style.transform = 'scale(0.85) translateY(10px)';
        } else {
          c.style.opacity = '0';
        }
      });

      // Show stack after cards fade (rAF-based timing)
      let stackStartTime = null;
      function showStackTick(timestamp) {
        if (!stackStartTime) stackStartTime = timestamp;
        if (timestamp - stackStartTime >= 450) {
          stackEl.classList.add('visible');
        } else {
          requestAnimationFrame(showStackTick);
        }
      }
      requestAnimationFrame(showStackTick);
    }

    function collapseBack() {
      if (!expanded) return;
      // Don't set expanded = false here - wait until animation finishes

      stackEl.classList.remove('visible');

      // PHASE 1 of collapse: fade out content (150ms)
      overlayHero.style.transition = 'opacity 0.15s ease';
      overlayBody.style.transition = 'opacity 0.15s ease';
      hideContent();

      // Wait for content to fade out, THEN shrink overlay
      setTimeout(() => {
        // Cancel any running animations on overlay
        overlay.getAnimations().forEach(a => a.cancel());
        if (expandAnim) {
          expandAnim = null;
        }

        overlay.classList.remove('open');
        overlay.classList.add('animating');

        // Get current overlay position for smooth collapse
        const currentRect = overlay.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();

        // PHASE 2 of collapse: shrink overlay back to card (580ms)
        collapseAnim = overlay.animate([
          {
            left: (currentRect.left - stageRect.left) + 'px',
            top: (currentRect.top - stageRect.top) + 'px',
            width: currentRect.width + 'px',
            height: currentRect.height + 'px',
            borderRadius: '50px',
            opacity: 1,
            transform: 'scale(1)'
          },
          {
            left: originRect.left + 'px',
            top: originRect.top + 'px',
            width: originRect.width + 'px',
            height: originRect.height + 'px',
            borderRadius: '18px',
            opacity: 1,
            transform: 'scale(1)',
            offset: 0.85
          },
          {
            left: originRect.left + 'px',
            top: originRect.top + 'px',
            width: originRect.width + 'px',
            height: originRect.height + 'px',
            borderRadius: '18px',
            opacity: 0,
            transform: 'scale(1)'
          }
        ], {
          duration: 580,
          easing: EXPO_OUT,
          fill: 'forwards'
        });

        // Restore cards with rAF-based stagger timing
        let cardsStartTime = null;
        function restoreCardsTick(timestamp) {
          if (!cardsStartTime) cardsStartTime = timestamp;
          if (timestamp - cardsStartTime >= 200) {
            cardDefs.forEach((def, i) => {
              const c = document.getElementById(def.id);
              c.style.transition = `opacity 0.45s ease ${i * 0.05}s, transform 0.45s ${EASE} ${i * 0.05}s`;
              c.style.opacity   = '1';
              c.style.transform = '';
            });
          } else {
            requestAnimationFrame(restoreCardsTick);
          }
        }
        requestAnimationFrame(restoreCardsTick);

        // Restore waveform with rAF timing
        let waveStartTime = null;
        function restoreWaveTick(timestamp) {
          if (!waveStartTime) waveStartTime = timestamp;
          if (timestamp - waveStartTime >= 450) {
            wave.classList.remove('hidden');
          } else {
            requestAnimationFrame(restoreWaveTick);
          }
        }
        requestAnimationFrame(restoreWaveTick);

        collapseAnim.onfinish = () => {
          // Cancel and clean up all overlay animations
          overlay.getAnimations().forEach(a => a.cancel());

          // Fully reset overlay to initial invisible state
          overlay.style.transition = 'none';
          overlay.style.left = '0';
          overlay.style.top = '0';
          overlay.style.width = '130px';
          overlay.style.height = '120px';
          overlay.style.opacity = '0';
          overlay.style.transform = 'none';
          overlay.style.borderRadius = '18px';
          overlay.style.pointerEvents = 'none';
          overlay.classList.remove('animating');

          // Reset content transitions back to normal
          overlayHero.style.transition = 'opacity 0.4s ease-in-out';
          overlayBody.style.transition = 'opacity 0.4s ease-in-out';

          // Resume floats on all cards
          cardDefs.forEach(def => {
            const c = document.getElementById(def.id);
            c.style.transition = '';
            c.style.opacity = '1';
            c.style.transform = '';
            resumeFloat(def);
          });

          // Clear state - NOW it's safe to accept new expand
          originRect = null;
          collapseAnim = null;
          expanded = false;
        };
      }, 150); // Wait for 150ms content fade-out to complete
    }

    // Card click handlers
    cardDefs.forEach(def => {
      document.getElementById(def.id).addEventListener('click', () => expandCard(def));
    });

    document.getElementById('overlay-back').addEventListener('click', collapseBack);
    stackEl.addEventListener('click', collapseBack);
  </script>
</body>
</html>
